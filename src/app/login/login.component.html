<app-navbar></app-navbar>

<div class="container py-4" style="max-width: 580px;">
    <div class="card border-10 shadow-sm rounded-4 overflow-hidden">

        <!-- Header -->
        <div class="card-header text-white text-center py-4 border-0"
            style="background: linear-gradient(135deg, #0d2137 0%, #1565c0 100%);">
            <div class="d-flex justify-content-center mb-3">
                <div class="rounded-circle d-flex align-items-center justify-content-center"
                    style="width: 68px; height: 68px; background: rgba(255, 255, 255, 0.18); border: 2px solid rgba(255, 255, 255, 0.3); font-size: 1.9rem;">
                    <i class="bi bi-mortarboard-fill"></i>
                </div>
            </div>
            <h4 class="fw-bold mb-1">
                Login
            </h4>
            <p class="mb-0 opacity-75 small">Online Result System</p>
        </div>

        <!-- Body -->
        <div class="card-body px-4 py-4">

            <!-- Error Message -->
            <div class="alert alert-danger py-2 mx-3 mt-3 d-flex justify-content-between align-items-center"
                *ngIf="form.error && form.message">
                <span>
                    <i class="bi bi-exclamation-circle-fill me-2"></i>
                    {{form.message}}
                </span>
                <button type="button" class="btn-close" (click)="form.message=''"></button>
            </div>
            <!-- Error Message -->
            <div class="alert alert-danger py-2 mx-3 mt-3 d-flex justify-content-between align-items-center"
                *ngIf="form.errorMessage">
                <span><i class="bi bi-exclamation-circle-fill me-2"></i>
                    {{form.errorMessage}}
                </span>
                <button type="button" class="btn-close" (click)="form.errorMessage=''"></button>
            </div>

            <!-- Success Message -->
            <div class="alert alert-success py-2 mx-3 mt-3 d-flex justify-content-between align-items-center"
                *ngIf="!form.error && form.message">

                <span>
                    <i class="bi bi-check-circle-fill me-2"></i>
                    {{form.message}}
                </span>

                <button type="button" class="btn-close" (click)="form.message=''">
                </button>

            </div>
            <!-- Login Id -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Login Id <span class="text-danger">*</span>
                </label>

                <input type="text" name="loginId" [(ngModel)]="form.data.loginId" placeholder="Enter Login ID"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.loginId}}
                </div>
            </div>

            <!-- Password -->
            <div class="mb-4">
                <label class="form-label fw-semibold">
                    Password <span class="text-danger">*</span>
                </label>

                <input type="password" name="password" [(ngModel)]="form.data.password" placeholder="Enter Password"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.password}}
                </div>
            </div>

            <!-- Buttons -->
            <div class="d-flex gap-2 mb-3">

                <button type="button" (click)="signIn()" class="btn btn-primary">

                    <i class="bi bi-box-arrow-in-right me-1"></i>
                    Sign In
                </button>

                <button type="button" (click)="signUp()" class="btn btn-outline-secondary">

                    <i class="bi bi-person-plus-fill me-1"></i>
                    Sign Up
                </button>

            </div>

            <!-- Forgot Password -->
            <div class="text-center">
                <a [routerLink]="['/forgotpassword']" class="text-decoration-none fw-semibold">
                    <i class="bi bi-key-fill me-1"></i>
                    Forgot my password?
                </a>
            </div>

        </div>

    </div>
</div>

<app-footer></app-footer>
