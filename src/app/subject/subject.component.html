<app-navbar></app-navbar>

<div class="container py-4" style="max-width: 580px;">
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">

        <!-- Header -->
        <div class="card-header text-white border-0 py-3 px-4"
            style="background: linear-gradient(135deg, #0d2137 0%, #1565c0 100%);">

            <h5 class="mb-0 fw-bold" *ngIf="!form.data.id">
                <i class="bi bi-book-fill me-2"></i>
                Add Subject
            </h5>

            <h5 class="mb-0 fw-bold" *ngIf="form.data.id > 0">
                <i class="bi bi-book-fill me-2"></i>
                Update Subject
            </h5>
        </div>

        <!-- Body -->
        <div class="card-body px-4 py-4">

            <!-- Success Message -->
            <div class="alert alert-success py-2" *ngIf="!form.error && form.message">
                <i class="bi bi-check-circle-fill me-2"></i>
                {{form.message}}
            </div>

            <!-- Error Message -->
            <div class="alert alert-danger py-2" *ngIf="form.error && form.message">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                {{form.message}}
            </div>

            <!-- Name -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Name <span class="text-danger">*</span>
                </label>

                <input type="text" name="name" [(ngModel)]="form.data.name" placeholder="Enter Course Name"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.name}}
                </div>
            </div>

            <!-- Course -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Course <span class="text-danger">*</span>
                </label>

                <select name="courseId" [(ngModel)]="form.data.courseId" class="form-select">

                    <option value="undefined">------------Select------------</option>

                    <option *ngFor="let obj of form.preload.courseList" [value]="obj.key">
                        {{obj.value}}
                    </option>
                </select>

                <div class="text-danger small mt-1">
                    {{form.inputerror.courseId}}
                </div>
            </div>

            <!-- Description -->
            <div class="mb-4">
                <label class="form-label fw-semibold">
                    Description <span class="text-danger">*</span>
                </label>

                <textarea name="description" [(ngModel)]="form.data.description" rows="3"
                    placeholder="Enter Short description" class="form-control" style="resize: none;">
                </textarea>

                <div class="text-danger small mt-1">
                    {{form.inputerror.description}}
                </div>
            </div>

            <!-- Buttons -->
            <div>

                <button type="button" (click)="submit()" class="btn btn-primary">
                    <i class="bi bi-save me-1"></i>
                    Save
                </button>


                <button type="button" (click)="forward('subjectlist')" class="btn btn-outline-secondary ms-2">
                    <i class="bi bi-list-ul me-1"></i>
                    List
                </button>


            </div>

        </div>
    </div>
</div>

<app-footer></app-footer>
