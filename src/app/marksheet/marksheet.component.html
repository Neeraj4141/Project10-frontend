<app-navbar></app-navbar>

<div class="container py-4" style="max-width: 580px;">
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">

        <!-- Header -->
        <div class="card-header text-white border-0 py-3 px-4"
            style="background: linear-gradient(135deg, #0d2137 0%, #1565c0 100%);">

            <h5 class="mb-0 fw-bold" *ngIf="!form.data.id">
                <i class="bi bi-journal-text me-2"></i>
                Add Marksheet
            </h5>

            <h5 class="mb-0 fw-bold" *ngIf="form.data.id > 0">
                <i class="bi bi-journal-text me-2"></i>
                Update Marksheet
            </h5>
        </div>

        <!-- Body -->
        <div class="card-body px-4 py-4">

            <!-- Success Message -->
            <div class="alert alert-success py-2" *ngIf="!form.error && form.message">
                <i class="bi bi-check-circle-fill me-2"></i>
                {{form.message}}
            </div>

            <!-- Error Message -->
            <div class="alert alert-danger py-2" *ngIf="form.error && form.message">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                {{form.message}}
            </div>

            <!-- Roll No -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Roll No <span class="text-danger">*</span>
                </label>

                <input type="text" name="rollNo" [(ngModel)]="form.data.rollNo" maxlength="5"
                    placeholder="Enter Roll No" class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.rollNo}}
                </div>
            </div>

            <!-- Student Name -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Name <span class="text-danger">*</span>
                </label>

                <select name="studentId" [(ngModel)]="form.data.studentId" class="form-select">

                    <option value="undefined">------------Select------------</option>

                    <option *ngFor="let obj of form.preload.studentList" [value]="obj.key">
                        {{obj.value}}
                    </option>
                </select>

                <div class="text-danger small mt-1">
                    {{form.inputerror.studentId}}
                </div>
            </div>

            <!-- Physics -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Physics <span class="text-danger">*</span>
                </label>

                <input type="text" name="physics" [(ngModel)]="form.data.physics" maxlength="3"
                    placeholder="Enter Physics Marks" class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.physics}}
                </div>
            </div>

            <!-- Chemistry -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Chemistry <span class="text-danger">*</span>
                </label>

                <input type="text" name="chemistry" [(ngModel)]="form.data.chemistry" maxlength="3"
                    placeholder="Enter Chemistry Marks" class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.chemistry}}
                </div>
            </div>

            <!-- Maths -->
            <div class="mb-4">
                <label class="form-label fw-semibold">
                    Maths <span class="text-danger">*</span>
                </label>

                <input type="text" name="maths" [(ngModel)]="form.data.maths" maxlength="3"
                    placeholder="Enter Maths Marks" class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.maths}}
                </div>
            </div>

            <!-- Buttons -->
            <div class="d-flex gap-2">

                <button type="button" (click)="submit()" class="btn btn-primary">
                    <i class="bi bi-save me-1"></i>
                    Save
                </button>

                <button type="button" (click)="forward('marksheetlist')" class="btn btn-outline-secondary">
                    <i class="bi bi-list-ul me-1"></i>
                    List
                </button>

            </div>

        </div>
    </div>
</div>

<app-footer></app-footer>
