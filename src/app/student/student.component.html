<app-navbar></app-navbar>

<div class="container py-4" style="max-width: 650px;">
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">

        <!-- Header -->
        <div class="card-header text-white border-0 py-3 px-4"
            style="background: linear-gradient(135deg, #0d2137 0%, #1565c0 100%);">

            <h5 class="mb-0 fw-bold" *ngIf="!form.data.id">
                <i class="bi bi-mortarboard-fill me-2"></i>
                Add Student
            </h5>

            <h5 class="mb-0 fw-bold" *ngIf="form.data.id > 0">
                <i class="bi bi-mortarboard-fill me-2"></i>
                Update Student
            </h5>
        </div>

        <!-- Body -->
        <div class="card-body px-4 py-4">

            <!-- Success Message -->
            <div class="alert alert-success py-2" *ngIf="!form.error && form.message">
                <i class="bi bi-check-circle-fill me-2"></i>
                {{form.message}}
            </div>

            <!-- Error Message -->
            <div class="alert alert-danger py-2" *ngIf="form.error && form.message">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                {{form.message}}
            </div>

            <!-- Enrol No -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Enrol No. <span class="text-danger">*</span>
                </label>

                <input type="text" name="enrolNo" [(ngModel)]="form.data.enrolNo" placeholder="Enter Enrol No"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.enrolNo}}
                </div>
            </div>

            <!-- First Name -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    First Name <span class="text-danger">*</span>
                </label>

                <input type="text" name="firstName" [(ngModel)]="form.data.firstName" placeholder="Enter First Name"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.firstName}}
                </div>
            </div>

            <!-- Last Name -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Last Name <span class="text-danger">*</span>
                </label>

                <input type="text" name="lastName" [(ngModel)]="form.data.lastName" placeholder="Enter Last Name"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.lastName}}
                </div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Email Id <span class="text-danger">*</span>
                </label>

                <input type="text" name="email" [(ngModel)]="form.data.email" placeholder="Enter Email ID"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.email}}
                </div>
            </div>

            <!-- DOB -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Date of Birth <span class="text-danger">*</span>
                </label>

                <input type="date" name="dob" [(ngModel)]="form.data.dob" [ngModel]="form.data.dob | date:'yyyy-MM-dd'"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.dob}}
                </div>
            </div>

            <!-- College -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    College <span class="text-danger">*</span>
                </label>

                <select name="collegeId" [(ngModel)]="form.data.collegeId" class="form-select">

                    <option value="undefined">------------Select------------</option>

                    <option *ngFor="let obj of form.preload.collegeList" [value]="obj.key">
                        {{obj.value}}
                    </option>
                </select>

                <div class="text-danger small mt-1">
                    {{form.inputerror.collegeId}}
                </div>
            </div>

            <!-- Mobile No -->
            <div class="mb-4">
                <label class="form-label fw-semibold">
                    Mobile No <span class="text-danger">*</span>
                </label>

                <input type="text" name="phoneNo" [(ngModel)]="form.data.phoneNo" maxlength="10"
                    placeholder="Enter Mobile No." class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.phoneNo}}
                </div>
            </div>

            <!-- Buttons -->
            <div>

                <button type="button" (click)="submit()" class="btn btn-primary">
                    <i class="bi bi-save me-1"></i>
                    Save
                </button>


                <button type="button" (click)="forward('student-list')" class="btn btn-outline-secondary ms-2">
                    <i class="bi bi-list-ul me-1"></i>
                    List
                </button>


            </div>

        </div>
    </div>
</div>

<app-footer></app-footer>
