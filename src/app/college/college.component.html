<app-navbar></app-navbar>

<div class="container py-4" style="max-width: 650px;">
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">

        <!-- Header -->
        <div class="card-header text-white border-0 py-3 px-4"
            style="background: linear-gradient(135deg, #0d2137 0%, #1565c0 100%);">

            <h5 class="mb-0 fw-bold" *ngIf="!form.data.id">
                <i class="bi bi-building me-2"></i>
                Add College
            </h5>

            <h5 class="mb-0 fw-bold" *ngIf="form.data.id > 0">
                <i class="bi bi-building me-2"></i>
                Update College
            </h5>
        </div>

        <!-- Body -->
        <div class="card-body px-4 py-4">

            <!-- Success Message -->
            <div class="alert alert-success py-2" *ngIf="!form.error && form.message">
                <i class="bi bi-check-circle-fill me-2"></i>
                {{form.message}}
            </div>

            <!-- Error Message -->
            <div class="alert alert-danger py-2" *ngIf="form.error && form.message">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                {{form.message}}
            </div>

            <!-- College Name -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Name <span class="text-danger">*</span>
                </label>

                <input type="text" name="name" [(ngModel)]="form.data.name" placeholder="Enter College Name"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.name}}
                </div>
            </div>

            <!-- Address -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Address <span class="text-danger">*</span>
                </label>

                <input type="text" name="address" [(ngModel)]="form.data.address" placeholder="Enter Address"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.address}}
                </div>
            </div>

            <!-- State -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    State <span class="text-danger">*</span>
                </label>

                <input type="text" name="state" [(ngModel)]="form.data.state" placeholder="Enter State"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.state}}
                </div>
            </div>

            <!-- City -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    City <span class="text-danger">*</span>
                </label>

                <input type="text" name="city" [(ngModel)]="form.data.city" placeholder="Enter City"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.city}}
                </div>
            </div>

            <!-- Phone No -->
            <div class="mb-4">
                <label class="form-label fw-semibold">
                    Phone No <span class="text-danger">*</span>
                </label>

                <input type="text" name="phoneNo" [(ngModel)]="form.data.phoneNo" maxlength="10"
                    placeholder="Enter Phone No." class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.phoneNo}}
                </div>
            </div>

            <!-- Buttons -->
            <div class="d-flex gap-2">

                <button type="button" (click)="submit()" class="btn btn-primary">
                    <i class="bi bi-save me-1"></i>
                    Save
                </button>

                <button type="button" (click)="forward('/college-list')" class="btn btn-outline-secondary">
                    <i class="bi bi-list-ul me-1"></i>
                    List
                </button>

            </div>

        </div>
    </div>
</div>

<app-footer></app-footer>
