<app-navbar></app-navbar>

<div class="container py-4" style="max-width: 600px;">
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">

        <!-- Header -->
        <div class="card-header text-white border-0 py-3 px-4"
            style="background: linear-gradient(135deg, #0d2137 0%, #1565c0 100%);">

            <h5 class="mb-0 fw-bold">
                <i class="bi bi-key-fill me-2"></i>
                Forget Password
            </h5>
        </div>

        <!-- Body -->
        <div class="card-body px-4 py-4">

            <!-- Error Message -->
            <div class="alert alert-danger py-2 mx-3 mt-3 d-flex justify-content-between align-items-center"
                *ngIf="form.error && form.message">

                <span>
                    <i class="bi bi-exclamation-circle-fill me-2"></i>
                    {{form.message}}
                </span>

                <button type="button" class="btn-close" (click)="form.message=''">
                </button>

            </div>

            <!-- Success Message -->
            <div class="alert alert-success py-2 mx-3 mt-3 d-flex justify-content-between align-items-center"
                *ngIf="!form.error && form.message">

                <span>
                    <i class="bi bi-check-circle-fill me-2"></i>
                    {{form.message}}
                </span>

                <button type="button" class="btn-close" (click)="form.message=''">
                </button>

            </div>
            <!-- Login Id -->
            <div class="mb-4">
                <label class="form-label fw-semibold">
                    Login Id <span class="text-danger">*</span>
                </label>

                <input type="text" name="loginId" [(ngModel)]="form.data.loginId" placeholder="Enter Login ID"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.loginId}}
                </div>
            </div>

            <!-- Button -->
            <div class="d-flex gap-2">
                <button type="button" (click)="submit()" class="btn btn-primary">
                    <i class="bi bi-arrow-right-circle me-1"></i>
                    Go
                </button>
            </div>

        </div>
    </div>
</div>

<app-footer></app-footer>
