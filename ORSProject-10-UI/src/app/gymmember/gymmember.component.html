<app-navbar></app-navbar>

<div class="container py-4" style="max-width: 580px;">
    <div class="card border-10 shadow-sm rounded-4 overflow-hidden">

        <!-- Header -->
        <div class="card-header text-white border-0 py-3 px-4"
            style="background: linear-gradient(135deg, #0d2137 0%, #1565c0 100%);">

            <h5 class="mb-0 fw-bold" *ngIf="!form.data.id">
                <i class="bi bi-person-plus-fill me-2"></i>
                Add Customer
            </h5>

            <h5 class="mb-0 fw-bold" *ngIf="form.data.id > 0">
                <i class="bi bi-pencil-square me-2"></i>
                Update Customer
            </h5>
        </div>

        <!-- Body -->
        <div class="card-body px-4 py-4">

            <!-- Error Message -->
            <div class="alert alert-danger py-2 mx-3 mt-3 d-flex justify-content-between align-items-center"
                *ngIf="form.error && form.message">

                <span>
                    <i class="bi bi-exclamation-circle-fill me-2"></i>
                    {{form.message}}
                </span>

                <button type="button" class="btn-close" (click)="form.message=''">
                </button>

            </div>

            <!-- Success Message -->
            <div class="alert alert-success py-2 mx-3 mt-3 d-flex justify-content-between align-items-center"
                *ngIf="!form.error && form.message">

                <span>
                    <i class="bi bi-check-circle-fill me-2"></i>
                    {{form.message}}
                </span>

                <button type="button" class="btn-close" (click)="form.message=''">
                </button>

            </div>

            <!-- Name -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Name <span class="text-danger">*</span>
                </label>

                <input type="text" name="name" [(ngModel)]="form.data.name"
                    placeholder="Enter Name" class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.name}}
                </div>
            </div>

            <!-- Age -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Age <span class="text-danger">*</span>
                </label>

                <input type="number" name="age" [(ngModel)]="form.data.age"
                    placeholder="Enter Age" class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.age}}
                </div>
            </div>

            <!-- Plan -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Plan <span class="text-danger">*</span>
                </label>

                <input type="text" name="plan" [(ngModel)]="form.data.plan"
                    placeholder="Enter Plan" class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.plan}}
                </div>
            </div>

            <!-- Mobile Number -->
            <div class="mb-4">
                <label class="form-label fw-semibold">
                    Mobile Number <span class="text-danger">*</span>
                </label>

                <input type="text" name="mobileNo" [(ngModel)]="form.data.mobileNo"
                    placeholder="Enter Mobile Number" class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.mobileNo}}
                </div>
            </div>

            <!-- Buttons -->
            <div class="d-flex gap-2 mt-4 pt-3 border-top">
                <button class="btn btn-primary" (click)="submit()">
                    <i class="bi bi-save me-1"></i>
                    Save
                </button>

                <button type="button" (click)="forward('gymmember-list')"
                    class="btn btn-outline-secondary">
                    <i class="bi bi-list-ul me-1"></i>
                    List
                </button>
            </div>

        </div>
    </div>
</div>

<app-footer></app-footer>
