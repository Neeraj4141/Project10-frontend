<app-navbar></app-navbar>

<div class="container py-4" style="max-width: 580px;">
    <div class="card border-10 shadow-sm rounded-4 overflow-hidden">

        <!-- Header -->
        <div class="card-header text-white border-0 py-3 px-4"
            style="background: linear-gradient(135deg, #0d2137 0%, #1565c0 100%);">

            <h5 class="mb-0 fw-bold" *ngIf="!form.data.id">
                <i class="bi bi-person-bounding-box me-2"></i>
                Add Face
            </h5>

            <h5 class="mb-0 fw-bold" *ngIf="form.data.id > 0">
                <i class="bi bi-pencil-square me-2"></i>
                Update Face
            </h5>

        </div>

        <!-- Body -->
        <div class="card-body px-4 py-4">

            <!-- Error Message -->
            <div class="alert alert-danger py-2 mx-3 mt-3 d-flex justify-content-between align-items-center"
                *ngIf="form.error && form.message">

                <span>
                    <i class="bi bi-exclamation-circle-fill me-2"></i>
                    {{form.message}}
                </span>

                <button type="button"
                    class="btn-close"
                    (click)="form.message=''">
                </button>

            </div>

            <!-- Success Message -->
            <div class="alert alert-success py-2 mx-3 mt-3 d-flex justify-content-between align-items-center"
                *ngIf="!form.error && form.message">

                <span>
                    <i class="bi bi-check-circle-fill me-2"></i>
                    {{form.message}}
                </span>

                <button type="button"
                    class="btn-close"
                    (click)="form.message=''">
                </button>

            </div>

            <!-- Face Code -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Face Code <span class="text-danger">*</span>
                </label>

                <input type="text"
                    name="faceCode"
                    [(ngModel)]="form.data.faceCode"
                    placeholder="Enter Face Code"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.faceCode}}
                </div>
            </div>

            <!-- User Name -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    User Name <span class="text-danger">*</span>
                </label>

                <input type="text"
                    name="userName"
                    [(ngModel)]="form.data.userName"
                    placeholder="Enter User Name"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.userName}}
                </div>
            </div>

            <!-- Image Path -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Image Path <span class="text-danger">*</span>
                </label>

                <input type="text"
                    name="imagePath"
                    [(ngModel)]="form.data.imagePath"
                    placeholder="Enter Image Path"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.imagePath}}
                </div>
            </div>

            <!-- Status -->
            <div class="mb-4">
                <label class="form-label fw-semibold">
                    Status <span class="text-danger">*</span>
                </label>

                <input type="text"
                    name="status"
                    [(ngModel)]="form.data.status"
                    placeholder="Enter Status"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.status}}
                </div>
            </div>

            <!-- Buttons -->
            <div class="d-flex gap-2 mt-4 pt-3 border-top">

                <button class="btn btn-primary" (click)="submit()">
                    <i class="bi bi-save me-1"></i>
                    Save
                </button>

                <button type="button"
                    (click)="forward('face-list')"
                    class="btn btn-outline-secondary">

                    <i class="bi bi-list-ul me-1"></i>
                    List
                </button>

            </div>

        </div>
    </div>
</div>

<app-footer></app-footer>
