<app-navbar></app-navbar>

<div class="container py-4" style="max-width: 580px;">
    <div class="card border-10 shadow-sm rounded-4 overflow-hidden">

        <!-- Header -->
        <div class="card-header text-white border-0 py-3 px-4"
            style="background: linear-gradient(135deg, #0d2137 0%, #1565c0 100%);">

            <h5 class="mb-0 fw-bold" *ngIf="!form.data.id">
                <i class="bi bi-building me-2"></i>
                Add Department
            </h5>

            <h5 class="mb-0 fw-bold" *ngIf="form.data.id > 0">
                <i class="bi bi-pencil-square me-2"></i>
                Update Department
            </h5>

        </div>

        <!-- Body -->
        <div class="card-body px-4 py-4">

            <!-- Error Message -->
            <div class="alert alert-danger py-2 mx-3 mt-3 d-flex justify-content-between align-items-center"
                *ngIf="form.error && form.message">

                <span>
                    <i class="bi bi-exclamation-circle-fill me-2"></i>
                    {{form.message}}
                </span>

                <button type="button"
                    class="btn-close"
                    (click)="form.message=''">
                </button>

            </div>

            <!-- Success Message -->
            <div class="alert alert-success py-2 mx-3 mt-3 d-flex justify-content-between align-items-center"
                *ngIf="!form.error && form.message">

                <span>
                    <i class="bi bi-check-circle-fill me-2"></i>
                    {{form.message}}
                </span>

                <button type="button"
                    class="btn-close"
                    (click)="form.message=''">
                </button>

            </div>

            <!-- Department Name -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Department Name <span class="text-danger">*</span>
                </label>

                <input type="text"
                    name="departmentName"
                    [(ngModel)]="form.data.departmentName"
                    placeholder="Enter Department Name"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.departmentName}}
                </div>
            </div>

            <!-- HOD Name -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    HOD Name <span class="text-danger">*</span>
                </label>

                <input type="text"
                    name="hodNamae"
                    [(ngModel)]="form.data.hodNamae"
                    placeholder="Enter HOD Name"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.hodNamae}}
                </div>
            </div>

            <!-- Total Faculty -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Total Faculty <span class="text-danger">*</span>
                </label>

                <input type="text"
                    name="totalFaculty"
                    [(ngModel)]="form.data.totalFaculty"
                    placeholder="Enter Total Faculty"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.totalFaculty}}
                </div>
            </div>

            <!-- Location -->
            <div class="mb-4">
                <label class="form-label fw-semibold">
                    Location <span class="text-danger">*</span>
                </label>

                <input type="text"
                    name="location"
                    [(ngModel)]="form.data.location"
                    placeholder="Enter Location"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.location}}
                </div>
            </div>

            <!-- Buttons -->
            <div class="d-flex gap-2 mt-4 pt-3 border-top">

                <button class="btn btn-primary" (click)="submit()">
                    <i class="bi bi-save me-1"></i>
                    Save
                </button>

                <button type="button"
                    (click)="forward('department-list')"
                    class="btn btn-outline-secondary">

                    <i class="bi bi-list-ul me-1"></i>
                    List
                </button>

            </div>

        </div>
    </div>
</div>

<app-footer></app-footer>
