<app-navbar></app-navbar>

<div class="container-fluid px-4 py-4" style="max-width: 1400px;">
    <div class="card border-10 shadow-sm rounded-4 overflow-hidden">

        <!-- Header -->
        <div class="card-header text-white border-0 py-3 px-4 d-flex justify-content-between align-items-center"
            style="background: linear-gradient(135deg, #0d2137 0%, #1565c0 100%);">

            <h5 class="mb-0 fw-bold">
                <i class="bi bi-p-square me-2"></i> Parking List
            </h5>

            <button class="btn btn-sm btn-light text-primary fw-semibold"
                (click)="forward('/parking')">

                <i class="bi bi-plus-circle me-1"></i> Add Parking
            </button>
        </div>

        <!-- Search Panel -->
        <div *ngIf="form.list.length > 0"
            class="p-3 bg-light border-bottom d-flex flex-wrap gap-2 align-items-center">

            <input type="text"
                class="form-control form-control-sm"
                style="max-width: 250px;"
                name="vehicalNumber"
                [(ngModel)]="form.searchParams.vehicalNumber"
                placeholder="Enter Vehicle Number">

            <button class="btn btn-primary btn-sm" (click)="search()">
                <i class="bi bi-search me-1"></i> Search
            </button>

            <button class="btn btn-secondary btn-sm" (click)="reset()">
                <i class="bi bi-bootstrap-reboot me-1"></i> Reset
            </button>

            <button class="btn btn-danger btn-sm ms-auto"
                (click)="deleteMany()">

                <i class="bi bi-trash me-1"></i> Delete Selected
            </button>

        </div>

        <!-- Error Message -->
        <div class="alert alert-danger py-2 mx-3 mt-3 d-flex justify-content-between align-items-center"
            *ngIf="form.error && form.message">

            <span>
                <i class="bi bi-exclamation-circle-fill me-2"></i>
                {{form.message}}
            </span>

            <button type="button"
                class="btn-close"
                (click)="form.message=''">
            </button>

        </div>

        <!-- Success Message -->
        <div class="alert alert-success py-2 mx-3 mt-3 d-flex justify-content-between align-items-center"
            *ngIf="!form.error && form.message">

            <span>
                <i class="bi bi-check-circle-fill me-2"></i>
                {{form.message}}
            </span>

            <button type="button"
                class="btn-close"
                (click)="form.message=''">
            </button>

        </div>

        <!-- Table -->
        <div class="table-responsive" *ngIf="form.list.length > 0">

            <table class="table table-hover align-middle mb-0">

                <thead class="table-light">

                    <tr>

                        <th width="40"></th>

                        <th>
                            <input type="checkbox"
                                [(ngModel)]="isMasterSel"
                                (change)="checkUncheckAll($event)" />
                        </th>

                        <th>S.No</th>
                        <th>Parking Code</th>
                        <th>Vehicle Number</th>
                        <th>Slot Number</th>
                        <th>Status</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody>

                    <tr *ngFor="let p of form.list; let i = index">

                        <td></td>

                        <td>
                            <input type="checkbox"
                                #checkboxes
                                (change)="checklistUpdate()"
                                [id]="p.id"
                                [value]="isMasterSel">
                        </td>

                        <td class="text-muted small">
                            {{(form.pageNo*5)+i+1}}
                        </td>

                        <td class="fw-semibold">
                            {{p.parkingCode}}
                        </td>

                        <td>
                            {{p.vehicalNumber}}
                        </td>

                        <td>
                            {{p.slotNumber}}
                        </td>

                        <td>
                            {{p.status}}
                        </td>

                        <td>
                            <button class="btn btn-sm btn-outline-primary"
                                (click)="forward('/parking/' + p.id)">

                                <i class="bi bi-pencil"></i> Edit
                            </button>
                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

        <!-- Footer Buttons -->
        <div class="p-3 border-top" *ngIf="form.list.length > 0">

            <div class="d-flex justify-content-between align-items-center">

                <button class="btn btn-outline-primary btn-sm"
                    (click)="previous()"
                    [disabled]="form.pageNo == 0">

                    <i class="bi bi-chevron-left"></i> Previous
                </button>

                <button class="btn btn-outline-primary btn-sm"
                    (click)="next()"
                    [disabled]="form.nextListSize == 0">

                    Next <i class="bi bi-chevron-right"></i>
                </button>

            </div>

        </div>

        <!-- No Data -->
        <div class="text-center p-4" *ngIf="form.list.length == 0">

            <button class="btn btn-secondary" (click)="reset()">
                Back
            </button>

        </div>

    </div>
</div>

<app-footer></app-footer>
