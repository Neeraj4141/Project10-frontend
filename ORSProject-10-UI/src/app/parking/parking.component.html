<app-navbar></app-navbar>

<div class="container py-4" style="max-width: 580px;">
    <div class="card border-10 shadow-sm rounded-4 overflow-hidden">

        <!-- Header -->
        <div class="card-header text-white border-0 py-3 px-4"
            style="background: linear-gradient(135deg, #0d2137 0%, #1565c0 100%);">

            <h5 class="mb-0 fw-bold" *ngIf="!form.data.id">
                <i class="bi bi-p-square me-2"></i>
                Add Parking
            </h5>

            <h5 class="mb-0 fw-bold" *ngIf="form.data.id > 0">
                <i class="bi bi-pencil-square me-2"></i>
                Update Parking
            </h5>

        </div>

        <!-- Body -->
        <div class="card-body px-4 py-4">

            <!-- Error Message -->
            <div class="alert alert-danger py-2 mx-3 mt-3 d-flex justify-content-between align-items-center"
                *ngIf="form.error && form.message">

                <span>
                    <i class="bi bi-exclamation-circle-fill me-2"></i>
                    {{form.message}}
                </span>

                <button type="button"
                    class="btn-close"
                    (click)="form.message=''">
                </button>

            </div>

            <!-- Success Message -->
            <div class="alert alert-success py-2 mx-3 mt-3 d-flex justify-content-between align-items-center"
                *ngIf="!form.error && form.message">

                <span>
                    <i class="bi bi-check-circle-fill me-2"></i>
                    {{form.message}}
                </span>

                <button type="button"
                    class="btn-close"
                    (click)="form.message=''">
                </button>

            </div>

            <!-- Parking Code -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Parking Code <span class="text-danger">*</span>
                </label>

                <input type="text"
                    name="parkingCode"
                    [(ngModel)]="form.data.parkingCode"
                    placeholder="Enter Parking Code"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.parkingCode}}
                </div>
            </div>

            <!-- Vehicle Number -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Vehicle Number <span class="text-danger">*</span>
                </label>

                <input type="text"
                    name="vehicalNumber"
                    [(ngModel)]="form.data.vehicalNumber"
                    placeholder="Enter Vehicle Number"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.vehicalNumber}}
                </div>
            </div>

            <!-- Slot Number -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Slot Number <span class="text-danger">*</span>
                </label>

                <input type="text"
                    name="slotNumber"
                    [(ngModel)]="form.data.slotNumber"
                    placeholder="Enter Slot Number"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.slotNumber}}
                </div>
            </div>

            <!-- Status -->
            <div class="mb-4">
                <label class="form-label fw-semibold">
                    Status <span class="text-danger">*</span>
                </label>

                <input type="text"
                    name="status"
                    [(ngModel)]="form.data.status"
                    placeholder="Enter Status"
                    class="form-control">

                <div class="text-danger small mt-1">
                    {{form.inputerror.status}}
                </div>
            </div>

            <!-- Buttons -->
            <div class="d-flex gap-2 mt-4 pt-3 border-top">

                <button class="btn btn-primary" (click)="submit()">
                    <i class="bi bi-save me-1"></i>
                    Save
                </button>

                <button type="button"
                    (click)="forward('parking-list')"
                    class="btn btn-outline-secondary">

                    <i class="bi bi-list-ul me-1"></i>
                    List
                </button>

            </div>

        </div>
    </div>
</div>

<app-footer></app-footer>
